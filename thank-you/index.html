    <style>
      :root {
        color-scheme: light;
        --blue: #0677d8;
        --blue-dark: #006fc9;
        --ink: #121923;
        --navy: #06121d;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        color: var(--ink);
        background:
          linear-gradient(90deg, rgba(4, 14, 22, 0.88), rgba(4, 14, 22, 0.76)),
          url("../kitchens/assets/client/kitchen-banner.jpg") center / cover no-repeat;
        font-family: Arial, Helvetica, sans-serif;
      }

      body.bathrooms {
        background:
          linear-gradient(90deg, rgba(4, 14, 22, 0.88), rgba(4, 14, 22, 0.76)),
          url("../bathrooms/assets/hero-bathroom.jpg") center / cover no-repeat;
      }

      main {
        width: min(100% - 40px, 620px);
        padding: 38px;
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 6px;
        color: var(--white);
        background: rgba(6, 18, 29, 0.94);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
        text-align: center;
      }

      img {
        width: 190px;
        height: auto;
        margin-bottom: 28px;
      }

      h1 {
        margin: 0 0 12px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(38px, 7vw, 56px);
        line-height: 1.04;
        font-weight: 400;
      }

      p {
        margin: 0 auto;
        max-width: 470px;
        color: rgba(255, 255, 255, 0.9);
        font-size: 17px;
        line-height: 1.55;
      }

      .actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 28px;
        flex-wrap: wrap;
      }

      a {
        min-height: 48px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 20px;
        border: 1px solid rgba(255, 255, 255, 0.42);
        border-radius: 4px;
        color: var(--white);
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
      }

      a.primary {
        border-color: transparent;
        background: linear-gradient(180deg, var(--blue), var(--blue-dark));
      }

      small {
        display: block;
        margin-top: 22px;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.45;
      }

      @media (max-width: 520px) {
        main {
          padding: 30px 22px;
        }

        .actions {
          display: grid;
        }

    <main>
      <img src="../kitchens/assets/client/adonis-logo.png" alt="Adonis Kitchen &amp; Bath" />
      <h1>Thank You</h1>
      <p>Your consultation request has been received. The Adonis Kitchen &amp; Bath team will review your project details and follow up soon.</p>
      <div class="actions">
        <a class="primary" href="tel:3307345727">Call (330) 734-5727</a>
        <a id="next-link" href="/kitchens/#projects">View Kitchen Projects</a>
      </div>
      <small>Need to add details or discuss timing? Give us a call and we will help with the next step.</small>
    </main>
    <script>
      window.dataLayer = window.dataLayer || [];

      const serviceNextLinks = {
        kitchens: "/kitchens/#projects",
        bathrooms: "/bathrooms/#projects"
      };

      const serviceNextText = {
        kitchens: "View Kitchen Projects",
        bathrooms: "View Bathroom Projects"
      };

      const service = new URLSearchParams(window.location.search).get("service");
      const nextLink = document.querySelector("#next-link");

      if (service) {
        document.body.classList.add(service);
      }

      if (nextLink && serviceNextLinks[service]) {
        nextLink.href = serviceNextLinks[service];
        nextLink.textContent = serviceNextText[service];
      }

      document.querySelectorAll('a[href^="tel:"]').forEach((phoneLink) => {
        phoneLink.addEventListener("click", () => {
          window.dataLayer.push({
            event: "phone_click",
            page_location: window.location.href,
            phone_number: phoneLink.getAttribute("href").replace("tel:", ""),
            link_text: phoneLink.textContent.trim()
          });
        });
      });
    </script>
  </body>
